<!DOCTYPE html>
<html>
<head>
    <title>琥珀引擎 - 统一数据</title>
    <style>
        .index-item {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .index-name {
            font-weight: bold;
        }
        .index-value {
            font-size: 18px;
        }
        .price-up {
            color: red;
        }
        .price-down {
            color: green;
        }
    </style>
</head>
<body>
    <h1>琥珀引擎 - 统一数据展示</h1>
    
    <div class="index-item">
        <div class="index-header">
            <span class="index-name">沪深300</span>
            <div class="index-value">4491.95</div>
            <div class="index-change price-up">-0.24%</div>
        </div>
    </div>
    
    <div class="index-item">
        <div class="index-header">
            <span class="index-name">创业板指</span>
            <div class="index-value">3273.36</div>
            <div class="index-change price-down">-0.68%</div>
        </div>
    </div>
    
    <!-- 智能卡片区域 -->
    <div id="intelligence-card">
        <h2>智能决策卡片</h2>
        <div class="card-content">
            <p>数据更新时间: <span id="update-time">2026-03-31 00:00:00</span></p>
            <p>数据源: <span id="data-source">Tushare Pro</span></p>
            <p>状态: <span id="data-status">等待更新</span></p>
        </div>
    </div>
    
    <!-- 宏观四锚区域 -->
    <div id="macro-anchors">
        <h2>宏观四锚</h2>
        <div class="anchor-item">
            <span class="anchor-name">人民币汇率</span>
            <span class="anchor-value">6.9000</span>
            <span class="anchor-change">+0.00%</span>
        </div>
        <div class="anchor-item">
            <span class="anchor-name">美债10Y收益率</span>
            <span class="anchor-value">4.35%</span>
            <span class="anchor-change">+0.00bps</span>
        </div>
        <div class="anchor-item">
            <span class="anchor-name">国际金价</span>
            <span class="anchor-value">4500.00 USD/oz</span>
            <span class="anchor-change">+0.00%</span>
        </div>
        <div class="anchor-item">
            <span class="anchor-name">国内金价</span>
            <span class="anchor-value">1000.00 CNY/g</span>
            <span class="anchor-change">+0.00%</span>
        </div>
    </div>
</body>
</html>
